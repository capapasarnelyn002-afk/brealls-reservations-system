<!DOCTYPE html>
<html>
<head>
  <title>Customer Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="dashboard-header">
    <h1>Customer Dashboard</h1>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </header>

  <section class="card">
    <h2>Available Lodges and Cottages</h2>
    <div id="accommodationList"></div>
  </section>

  <section class="card">
    <h2>Book Accommodation</h2>

    <select id="accommodationSelect"></select>
    <input type="date" id="checkIn">
    <input type="date" id="checkOut">
    <input type="number" id="guests" placeholder="Number of Guests">

    <button class="main-button" onclick="bookAccommodation()">Submit Booking</button>
  </section>

  <section class="card">
    <h2>My Bookings</h2>
    <div id="bookingList"></div>
  </section>

  <script src="js/app.js"></script>
  <script>
    loadAccommodations();
    loadBookings();
  </script>

</body>
</html>
